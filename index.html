<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLF_WMS</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" src="app.js"></script>
</head>
<body>
  <!-- =========================
        APP SHELL (СТАТИЧЕСКИЙ КАРКАС)
        ========================= -->
  <div id="app">
      <!-- HEADER (меню вкладок) -->
    <header class="shell-header">
        <nav> 
            <div class="logo">
                <picture>
                    <source srcset="./media/images/BLF-logo.webp" type="image/webp">
                    <img src="./media/images/BLF-logo.png" alt="BLF WMS Logo" width="200" height="50">
                </picture>
            </div>
            <ul>
                <li> <button id="nav-products">Products</button></li>
                <li> <button id="nav-warehouse">Warehouse</button></li>
            </ul>           
        </nav>
    </header>

    <!-- MAIN CONTENT (сюда рендерятся модули) -->
    <main id="content" class="shell-content">
        <!-- JS будет подставлять сюда Product Library / Warehouse / other... -->
    </main>

    <!-- FOOTER -->
    <footer class="shell-footer">
        <div class="version-holder">BLF WMS · v0.1</div>
        <div class="copyright-holder">© 2026 Designed and Developed by Denys Deineka</div>
    </footer>
  </div>
</body>

</html>
</body>
</html>
